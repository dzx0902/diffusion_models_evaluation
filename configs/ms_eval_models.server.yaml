# Windows GPU server-oriented model command templates.
#
# Usage:
# 1. Prepare model repos and weights on the Windows GPU server.
# 2. Set environment variables in PowerShell:
#    $env:MS_MODELS_ROOT = "D:\ms_video_models"
#    $env:MS_BENCHMARK_ROOT = "D:\diffusion_models_evaluation"
#    $env:MS_HUNYUAN_GPUS = "1"
# 3. Change enabled to true only after each model's standalone smoke test passes.

models:
  - id: hunyuanvideo_1_5_480p_t2v
    type: t2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'HunyuanVideo-1.5';
      Set-Location $repo;
      conda run -n hunyuanvideo15 torchrun --nproc_per_node $env:MS_HUNYUAN_GPUS generate.py
      --prompt '{prompt}'
      --image_path none
      --resolution 480p
      --aspect_ratio 16:9
      --seed {seed}
      --rewrite false
      --cfg_distilled false
      --sr false
      --output_path '{output_path}'
      --model_path (Join-Path $repo 'ckpts')"

  - id: hunyuanvideo_1_5_480p_i2v
    type: i2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'HunyuanVideo-1.5';
      Set-Location $repo;
      conda run -n hunyuanvideo15 torchrun --nproc_per_node $env:MS_HUNYUAN_GPUS generate.py
      --prompt '{prompt}'
      --image_path '{input_image}'
      --resolution 480p
      --aspect_ratio 16:9
      --seed {seed}
      --rewrite false
      --cfg_distilled false
      --sr false
      --output_path '{output_path}'
      --model_path (Join-Path $repo 'ckpts')"

  - id: wan2_2_ti2v_5b_t2v
    type: t2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'Wan2.2';
      Set-Location $repo;
      conda run -n wan22 python generate.py
      --task ti2v-5B
      --size 1280*704
      --ckpt_dir (Join-Path $repo 'Wan2.2-TI2V-5B')
      --offload_model True
      --convert_model_dtype
      --t5_cpu
      --base_seed {seed}
      --prompt '{prompt}'
      --save_file '{output_path}'"

  - id: wan2_2_ti2v_5b_i2v
    type: ti2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'Wan2.2';
      Set-Location $repo;
      conda run -n wan22 python generate.py
      --task ti2v-5B
      --size 1280*704
      --ckpt_dir (Join-Path $repo 'Wan2.2-TI2V-5B')
      --offload_model True
      --convert_model_dtype
      --t5_cpu
      --base_seed {seed}
      --image '{input_image}'
      --prompt '{prompt}'
      --save_file '{output_path}'"

  - id: cogvideox1_5_5b
    type: t2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'CogVideo';
      $model = Join-Path $env:MS_MODELS_ROOT 'CogVideoX1.5-5B';
      Set-Location $repo;
      conda run -n cogvideox15 python inference\cli_demo.py
      --prompt '{prompt}'
      --model_path $model
      --generate_type t2v
      --output_path '{output_path}'
      --num_frames 81
      --fps {fps}
      --seed {seed}
      --dtype bfloat16"

  - id: cogvideox1_5_5b_i2v
    type: i2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$repo = Join-Path $env:MS_MODELS_ROOT 'CogVideo';
      $model = Join-Path $env:MS_MODELS_ROOT 'CogVideoX1.5-5B-I2V';
      Set-Location $repo;
      conda run -n cogvideox15 python inference\cli_demo.py
      --prompt '{prompt}'
      --image_or_video_path '{input_image}'
      --model_path $model
      --generate_type i2v
      --output_path '{output_path}'
      --num_frames 49
      --fps {fps}
      --seed {seed}
      --dtype float16"

  - id: contentv_8b
    type: t2v
    enabled: false
    command_template: >
      powershell -NoProfile -ExecutionPolicy Bypass -Command
      "$adapter = Join-Path $env:MS_BENCHMARK_ROOT 'scripts\adapters\contentv_generate.py';
      $repo = Join-Path $env:MS_MODELS_ROOT 'ContentV';
      $model = Join-Path $env:MS_MODELS_ROOT 'ContentV-8B';
      conda run -n contentv8b python $adapter
      --repo $repo
      --model-id $model
      --prompt '{prompt}'
      --output '{output_path}'
      --seed {seed}
      --fps {fps}"
